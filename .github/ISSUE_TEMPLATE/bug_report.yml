name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - server
        - admin
        - npm-sdk
        - python-sdk
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.3.1

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell