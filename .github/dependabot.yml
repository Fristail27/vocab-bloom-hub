version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/apps/frontend'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/apps/server'
    schedule:
      interval: 'weekly'

    groups:
      npm-all:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
